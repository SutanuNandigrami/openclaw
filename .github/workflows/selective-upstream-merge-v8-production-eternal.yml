# Workflow for Selective Upstream Merge v8 Production Eternal

name: Selective Upstream Merge v8 Production Eternal

on:
  push:
    branches:
      - main

jobs:
  merge:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Merge upstream changes
      run: |
        git fetch upstream
        git checkout main
        git merge upstream/main

    - name: Deploy to Production
      env:
        SECRET_TOKEN: ${{ secrets.SECRET_TOKEN }}
      run: |
        echo "Deploying to production with token $SECRET_TOKEN"